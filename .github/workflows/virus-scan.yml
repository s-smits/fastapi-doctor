name: Socket Supply Chain Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: socket-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  socket-security:
    name: Scan Python And Rust Dependencies With Socket
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade socketsecurity

      - name: Run Socket supply chain scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -z "${SOCKET_SECURITY_API_KEY}" ]; then
            echo "Missing SOCKET_SECURITY_API_KEY secret. Install Socket for GitHub or add the repository secret before enabling this workflow." >&2
            exit 1
          fi

          PR_NUMBER=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER=${{ github.event.pull_request.number }}
          fi

          socketcli \
            --target-path "${GITHUB_WORKSPACE}" \
            --scm github \
            --pr-number "${PR_NUMBER}"
