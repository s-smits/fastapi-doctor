name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Build source distribution
        run: uv build --sdist
      - name: Verify source distribution version matches tag
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import re
          import tarfile
          from pathlib import Path

          sdist = sorted(Path("dist").glob("*.tar.gz"))[-1]
          with tarfile.open(sdist, "r:gz") as archive:
              member = next(item for item in archive.getmembers() if item.name.endswith("PKG-INFO"))
              metadata_text = archive.extractfile(member).read().decode()
          match = re.search(r"^Version: (.+)$", metadata_text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read sdist package version")
          if match.group(1) != os.environ["TAG_VERSION"]:
              raise SystemExit(f"sdist version mismatch: {match.group(1)} != {os.environ['TAG_VERSION']}")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist/*

  build-wheel:
    needs: build-sdist
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform-tag: linux-x86_64
          - os: ubuntu-24.04-arm
            platform-tag: linux-arm64
          - os: macos-13
            platform-tag: darwin-x86_64
          - os: macos-14
            platform-tag: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: dtolnay/rust-toolchain@stable
      - name: Stage native binary
        run: python scripts/stage_native_binary.py --platform-tag "${{ matrix.platform-tag }}" --version "${GITHUB_REF_NAME#v}"
      - name: Build wheel
        run: uv build --wheel
      - name: Verify wheel version and bundled native asset
        env:
          PLATFORM_TAG: ${{ matrix.platform-tag }}
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import os
          import re
          import zipfile
          from pathlib import Path

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected one wheel, found {len(wheels)}")

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as archive:
              names = set(archive.namelist())
              expected_binary = f"fastapi_doctor/bin/{os.environ['PLATFORM_TAG']}/fastapi-doctor-native"
              if expected_binary not in names:
                  raise SystemExit(f"Missing bundled native binary: {expected_binary}")
              metadata_name = next(name for name in names if name.endswith("METADATA"))
              metadata_text = archive.read(metadata_name).decode()

          match = re.search(r"^Version: (.+)$", metadata_text, re.MULTILINE)
          if match is None:
              raise SystemExit("Could not read wheel package version")
          expected_version = os.environ["TAG_VERSION"]
          if match.group(1) != expected_version:
              raise SystemExit(f"wheel version mismatch: {match.group(1)} != {expected_version}")
          PY
      - name: Smoke test installed wheel
        run: |
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          fastapi-doctor --version
          python - <<'PY'
          import os
          import fastapi_doctor
          import fastapi_doctor.native_core as native_core

          expected_version = os.environ["TAG_VERSION"]
          assert fastapi_doctor.__version__ == expected_version
          binary = native_core._resolve_binary()
          assert binary is not None, native_core.last_native_reason()
          print(binary)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform-tag }}
          path: dist/*

  publish-pypi:
    if: ${{ vars.PUBLISH_TO_PYPI == '1' }}
    needs:
      - build-sdist
      - build-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs:
      - build-sdist
      - build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
