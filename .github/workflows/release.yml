name: Build And Release Wheels

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  version-check:
    name: Validate Version Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          cargo = tomllib.loads(Path("rust/Cargo.toml").read_text())
          version = cargo["workspace"]["package"]["version"]
          ref = os.environ["GITHUB_REF"]

          if ref.startswith("refs/tags/"):
              tag = ref.removeprefix("refs/tags/")
              expected = f"v{version}"
              if tag != expected:
                  raise SystemExit(f"tag {tag!r} does not match package version {expected!r}")

          print(f"validated package version {version}")
          PY

  build-wheels:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            manylinux: auto
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            manylinux: auto
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: auto
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist --interpreter python3.12
          sccache: true

      - name: Smoke test wheel
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall dist/*.whl
          fastapi-doctor --version
          python - <<'PY'
          import fastapi_doctor
          import fastapi_doctor.native_core as native_core

          print(fastapi_doctor.__version__)
          print(native_core.get_native_rule_ids())
          PY

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
